name: 🚀 Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    name: 🛠️ Build & Test Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ⚡ Build Docker Image (Test Build)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: portfolio-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚀 Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "📥 Mengambil kode terbaru dari GitHub..."
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin master
            
            echo "🐳 Memulai ulang container Docker..."
            docker compose up -d --build
            
            echo "🗄️ Menjalankan migrasi database..."
            docker exec -i portfolio-app php database/migrate.php
            
            echo "🌱 Menjalankan seeder database..."
            docker exec -i portfolio-app php database/seed.php
            
            echo "🎉 ✅ Deployment selesai dengan sukses!"
